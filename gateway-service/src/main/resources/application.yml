spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:4001
              predicates:
                - Path=/api/users/**
              filters:
                - name: AuthFilter

            - id: chat-service
              uri: http://localhost:4000
              predicates:
                - Path=/api/rooms/**, /api/messages/**, /api/rooms/**
              filters:
                - name: AuthFilter

            - id: ws-service
              uri: http://localhost:4002
              predicates:
                - Path=/ws/**
              filters:
                - name: AuthFilter  # validate JWT tr??c khi upgrade WebSocket

jwt:
  secret: youraccesstokensecretbase64encoded256bityouraccesstokensecretbase64encoded256bityouraccesstokensecretbase64encoded256bit
gateway:
  internal-secret: ${INTERNAL_SECRET:telegramsecretkey}

# Public endpoints ? khŰng c?n JWT
public:
  endpoints:
    - /api/users/auth/login
    - /api/users/auth/register
    - /api/users/auth/refresh
    - /api/users/auth/google
    - /api/users/auth/logout
server:
  port: 3000