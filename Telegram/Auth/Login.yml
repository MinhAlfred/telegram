info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/users/auth/login"
  headers:
    - name: ""
      value: ""
  body:
    type: json
    data: |-
      {
        "username": "lan",
        "password": "string"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        bru.setEnvVar("accessToken", body.data.accessToken);
        bru.setEnvVar("refreshToken", body.data.refreshToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
