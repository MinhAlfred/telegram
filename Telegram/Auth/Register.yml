info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/users/auth/register"
  body:
    type: json
    data: |-
      {
        "username": "lan",
        "email": "lan@example.com",
        "password": "string",
        "displayName": "Lan Xinh"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
