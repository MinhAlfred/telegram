spring:
  application:
    name: ws-service

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:19092
    consumer:
      group-id: ws-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

jwt:
  secret: youraccesstokensecretbase64encoded256bityouraccesstokensecretbase64encoded256bityouraccesstokensecretbase64encoded256bit

server:
  port: 4002

presence:
  stale-threshold-ms: 30000   # score cũ hơn 30s → coi là offline (phải > STOMP heartbeat 20s)
  cleanup-interval-ms: 20000  # chạy mỗi 20s

chat-service:
  url: ${CHAT_SERVICE_URL:http://localhost:4000}

internal:
  secret: ${INTERNAL_SECRET:telegramsecretkey}

logging:
  level:
    thitkho.wsservice.interceptor: DEBUG
    thitkho.wsservice.config: DEBUG