spring:
  application:
    name: chat-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    producer:
      properties:
        spring.json.add.type.headers: false
        delivery.timeout.ms: 30000
        request.timeout.ms: 15000
      retries: 5
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
      initialization-fail-timeout: 60000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_MODE:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:?CLOUDINARY_CLOUD_NAME is required}
  api-key: ${CLOUDINARY_API_KEY:?CLOUDINARY_API_KEY is required}
  api-secret: ${CLOUDINARY_API_SECRET:?CLOUDINARY_API_SECRET is required}

api:
  prefix: /api

server:
  port: 4000

user-service:
    url: ${USER_SERVICE_URL:http://localhost:4001}

internal:
  secret: ${INTERNAL_SECRET:telegramsecretkey}

# Logging configuration for debugging
logging:
  level:
    thitkho.chatservice: DEBUG
    thitkho.chatservice.controller: DEBUG
    thitkho.chatservice.service: DEBUG
    thitkho.chatservice.producer: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
